{% extends 'base.html' %}
{% block title %}Error {{ code }} — NDA Generator AI{% endblock %}

{% block content %}
<div class="page-wrap">
  <div class="container-sm">
    <div class="card text-center" style="padding:3rem">
      <div style="font-size:3.5rem;margin-bottom:.75rem">
        {% if code == 404 %}🔍{% elif code == 403 %}🔒{% else %}⚠{% endif %}
      </div>
      <h1 style="font-size:2rem;font-weight:800;color:var(--brand-dark);margin-bottom:.5rem">{{ code }}</h1>
      <p class="text-muted" style="margin-bottom:1.5rem">{{ message }}</p>
      <a href="/" class="btn btn-primary">← Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}
