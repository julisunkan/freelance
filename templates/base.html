<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Freelancer Proposal Builder{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#4f46e5">
</head>
<body>

<div class="app-shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <i class="bi bi-briefcase-fill"></i>
      <span>ProposalBuilder</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
        <i class="bi bi-speedometer2"></i><span>Dashboard</span>
      </a>
      <a href="/proposals/new" class="nav-item {% if request.path == '/proposals/new' %}active{% endif %}">
        <i class="bi bi-plus-circle"></i><span>New Proposal</span>
      </a>
      <a href="/templates" class="nav-item {% if request.path == '/templates' %}active{% endif %}">
        <i class="bi bi-layout-text-window-reverse"></i><span>Templates</span>
      </a>

    </nav>
    <div class="sidebar-footer">
      <a href="/julisunkan?token=julisunkan" class="nav-item text-muted">
        <i class="bi bi-gear"></i><span>Admin</span>
      </a>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <div class="page-content">

      <!-- Inline message container — all notifications appear here -->
      <div id="inline-messages" role="alert" aria-live="polite"></div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <script>
            document.addEventListener('DOMContentLoaded', function () {
              {% for category, message in messages %}
                showNotification({{ message|tojson }}, {{ category|tojson }});
              {% endfor %}
            });
          </script>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
<script src="/static/script.js?v=3"></script>
{% block scripts %}{% endblock %}
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
